name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/claude-linux-amd64 ./cmd/claude
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/claude-linux-arm64 ./cmd/claude
          
          # macOS AMD64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/claude-darwin-amd64 ./cmd/claude
          
          # macOS ARM64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/claude-darwin-arm64 ./cmd/claude
          
          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/claude-windows-amd64.exe ./cmd/claude
          
          # Create checksums
          cd dist
          sha256sum * > checksums.txt

      - name: Create archives
        run: |
          cd dist
          
          # Create tar.gz for Unix systems
          for f in claude-linux-* claude-darwin-*; do
            tar -czvf "${f}.tar.gz" "$f"
            rm "$f"
          done
          
          # Create zip for Windows
          zip claude-windows-amd64.zip claude-windows-amd64.exe
          rm claude-windows-amd64.exe
          
          # Regenerate checksums for archives
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
